name: ci

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          DEPLOYMENT_SCOPE: dev
          TEMPLATE_ENV: dev
          DEV_API_URL: http://app-service.test
        run: |
          pytest tests/ -v --tb=short

  ruff:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff==0.7.4

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

  # TODO: re-enable frontend-lint once pre-existing ESLint violations in
  # template-auto-v1 are cleaned up (13 errors as of this commit).

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Vite build
        run: npm run build
